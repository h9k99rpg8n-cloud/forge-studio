<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="Forge Studio es un editor 3D web para crear modelos por bloques desde movil y navegador.">
  <title>Forge Studio Alfa 0.2</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="viewport-card">
      <canvas id="viewport"></canvas>

      <header class="topbar glass">
        <div>
          <h1>Forge Studio</h1>
          <p>Alfa 0.2 - Gizmos de transformacion</p>
        </div>
        <button id="deleteBtn" class="danger-btn">Borrar</button>
      </header>

      <div class="left-panel glass">
        <button id="addCubeBtn" class="tool-btn">Cubo</button>
        <button id="duplicateBtn" class="tool-btn">Duplicar</button>
        <button id="colorBtn" class="tool-btn">Color</button>
        <input id="colorPicker" type="color" value="#38bdf8">
      </div>

      <div class="right-tools glass">
        <button id="moveModeBtn" class="tool-btn active">Mover</button>
        <button id="rotateModeBtn" class="tool-btn">Rotar</button>
        <button id="scaleModeBtn" class="tool-btn">Escalar</button>
      </div>

      <div class="bottom-status glass" id="statusText">Escena lista</div>
      <div class="hint">Arrastra para orbitar • Pellizca para zoom • Toca un cubo • Usa el gizmo</div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
